<!DOCTYPE html>
<html>

<head>
    <title>Fingerprint Recognition</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }

        img {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🔍 Fingerprint Recognition System</h2>

        <form method="POST" enctype="multipart/form-data">
            <p>Upload Fingerprint 1</p>
            <input type="file" name="file1" required><br><br>

            <p>Upload Fingerprint 2</p>
            <input type="file" name="file2" required><br><br>

            <button type="submit">Compare</button>
        </form>

        {% if result %}
        <h3>{{ result|safe }}</h3>

        <h4>ORB Matching Visualization</h4>
        <img src="{{ url_for('static', filename='match.jpg') }}">

        <h4>Comparison Graph</h4>
        <img src="{{ url_for('static', filename='result.png') }}">
        {% endif %}

    </div>

</body>

</html>
