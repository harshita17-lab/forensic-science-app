<!DOCTYPE html>
<html>

<head>
    <title>Multi-Modal Biometric System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        input,
        select,
        button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>🔍 Multi-Modal Biometric System</h1>

    <div class="container">
        <form method="POST" enctype="multipart/form-data">

            <h3>Fingerprint</h3>
            <label>Upload Fingerprint 1:</label>
            <input type="file" name="file1" required><br>

            <label>Upload Fingerprint 2:</label>
            <input type="file" name="file2" required><br>

            <h3>Face</h3>
            <label>Upload Face 1:</label>
            <input type="file" name="face1"><br>

            <label>Upload Face 2:</label>
            <input type="file" name="face2"><br>

            <h3>Mode Selection</h3>
            <select name="mode">
                <option value="fingerprint">Fingerprint Only</option>
                <option value="face">Face Only</option>
                <option value="multimodal">Multimodal</option>
            </select>

            <br><br>
            <button type="submit">Compare</button>

        </form>

        <!-- RESULTS -->
        <div class="result">

            {% if result %}
            <h3>Fingerprint Result:</h3>
            <p>{{ result|safe }}</p>
            {% endif %}

            {% if face_result %}
            <h3>Face Result:</h3>
            <p>{{ face_result }}</p>
            {% endif %}

            {% if final_score %}
            <h3>Final Combined Score:</h3>
            <p>{{ final_score }}</p>
            {% endif %}

        </div>
    </div>

</body>

</html>
